<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="startalk_asd">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>startalk_asd</title>
  <link rel="manifest" href="manifest.json">
  <script>
    window._asdLastFrame = '';
    window._asdReady = false;
    window._asdDenied = false;

    // Dart calls this once; everything runs in JS — no stream passed from Dart
    window.asdStart = function() {
      navigator.mediaDevices.getUserMedia({video: {width:320, height:240}, audio:false})
        .then(function(stream) {
          const track = stream.getVideoTracks()[0];
          const ic = new ImageCapture(track);
          window._asdReady = true;
          console.log('[ASD] camera ready:', track.label);
          (function loop() {
            ic.grabFrame().then(function(bm) {
              const c = document.createElement('canvas');
              c.width = 320; c.height = 240;
              c.getContext('2d').drawImage(bm, 0, 0, 320, 240);
              bm.close();
              window._asdLastFrame = c.toDataURL('image/jpeg', 0.7);
            }).catch(function(){}).finally(function(){ setTimeout(loop, 700); });
          })();
        })
        .catch(function(e) {
          console.warn('[ASD] camera denied:', e);
          window._asdDenied = true;
        });
    };

    window.asdIsReady  = function() { return window._asdReady; };
    window.asdIsDenied = function() { return window._asdDenied; };
    window.asdGetFrame = function() { return window._asdLastFrame; };
    window.asdStop     = function() { window._asdLastFrame = ''; window._asdReady = false; };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
