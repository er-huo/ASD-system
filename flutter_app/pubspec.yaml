name: startalk_asd
description: 星语灵境 — ASD emotion training system
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  http: ^1.2.1
  web_socket_channel: ^3.0.0
  shared_preferences: ^2.3.0
  camera: ^0.11.0+2
  rive: ^0.13.4
  just_audio: ^0.9.40
  fl_chart: ^0.68.0
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/audio/
    - assets/images/pcs/
    - assets/images/photos/
    - assets/videos/
